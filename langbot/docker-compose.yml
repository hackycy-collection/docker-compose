version: "3"

services:

  langbot_plugin_runtime:
    image: rockchin/langbot:latest
    container_name: langbot_plugin_runtime
    # platform: linux/amd64 # For Apple Silicon compatibility
    privileged: true
    user: root
    volumes:
      - /opt/langbot/plugins:/app/data/plugins
    # ports:
    #   - 5401:5401
    restart: on-failure
    environment:
      - TZ=Asia/Shanghai
    command: ["uv", "run", "-m", "langbot_plugin.cli.__init__", "rt"]

  langbot:
    image: rockchin/langbot:latest
    container_name: langbot
    # platform: linux/amd64 # For Apple Silicon compatibility
    privileged: true
    user: root
    volumes:
      - /opt/langbot/data:/app/data
    restart: on-failure
    environment:
      - TZ=Asia/Shanghai
    # ports:
    #   - 5300:5300  # For web ui and webhook callback
    #   - 2280-2285:2280-2285  # For platform reverse connection

networks:
  default:
    external:
      name: nginx_proxy_shared