services:
  network-service:
    image: alpine
    container_name: lobe-network
    restart: always
    ports:
      - '9000:9000' # RustFS API
      - '9001:9001' # RustFS Console
      - '3210:3210' # LobeChat
    command: tail -f /dev/null
    networks:
      - lobe-network

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: lobe-postgres
    ports:
      - '5432:5432'
    volumes:
      - '/opt/lobe/paradedb/data:/var/lib/postgresql/data'
    environment:
      POSTGRES_DB: *lobe_db_name
      POSTGRES_PASSWORD: *postgres_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - lobe-network

  redis:
    image: redis:7-alpine
    container_name: lobe-redis
    ports:
      - '6379:6379'
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - lobe-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lobe-rustfs
    network_mode: 'service:network-service'
    environment:
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_ACCESS_KEY: *rustfs_access_key
      RUSTFS_SECRET_KEY: *rustfs_secret_key
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
    command:
      ['--access-key', *rustfs_access_key, '--secret-key', *rustfs_secret_key, '/data']

  rustfs-init:
    image: minio/mc:latest
    container_name: lobe-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - /opt/lobe/rustfs/bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command: -c ' set -eux; echo "S3_ACCESS_KEY=admin, S3_SECRET_KEY=YOUR_RUSTFS_PASSWORD"; mc --version; mc alias set rustfs "http://network-service:9000" "admin" "YOUR_RUSTFS_PASSWORD"; mc ls rustfs || true; mc mb "rustfs/lobe" --ignore-existing; mc admin info rustfs || true; mc anonymous set-json "/bucket.config.json" "rustfs/lobe"; '
    restart: 'no'
    networks:
      - lobe-network

  searxng:
    image: searxng/searxng
    container_name: lobe-searxng
    volumes:
      - '/opt/lobe/searxng/searxng-settings.yml:/etc/searxng/settings.yml'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'
    restart: always
    networks:
      - lobe-network
    # env_file:
    #   - .env

  lobe:
    image: lobehub/lobehub
    container_name: lobehub
    network_mode: 'service:network-service'
    depends_on:
      postgresql:
        condition: service_healthy
      network-service:
        condition: service_started
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KEY_VAULTS_SECRET: *key_vaults_secret
      AUTH_SECRET: *auth_secret
      JWKS_KEY: *jwks_key
      DATABASE_URL: *database_url
      S3_BUCKET: *rustfs_lobe_bucket
      S3_ENABLE_PATH_STYLE: '1'
      S3_ACCESS_KEY: *rustfs_access_key
      S3_ACCESS_KEY_ID: *rustfs_access_key
      S3_SECRET_ACCESS_KEY: *rustfs_secret_key
      LLM_VISION_IMAGE_USE_BASE64: '1'
      S3_SET_ACL: '0'
      SEARXNG_URL: http://searxng:8080
      REDIS_URL: redis://redis:6379
      REDIS_PREFIX: lobechat
      REDIS_TLS: '0'
      APP_URL: https://lobe.example.com  # 浏览器访问的公开 URL
      INTERNAL_APP_URL: http://localhost:3210  # 服务器到服务器调用的内部 URL
    # env_file:
    #   - .env
    restart: always

volumes:
  data:
    driver: local
  redis_data:
    driver: local
  rustfs-data:
    driver: local

networks:
  lobe-network:
    driver: bridge